<article class="service-card">
    <div class="service-card-visual">
        {% if service.image %}
            <img src="{{ service.image.url }}" alt="{{ service.name }}">
        {% else %}
            <div class="mini-pitch" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>
        {% endif %}
    </div>
    <div class="service-card-body">
        <p class="service-meta">{{ service.category.name }} / {{ service.get_analysis_type_display }}</p>
        <h3>{{ service.name }}</h3>
        <p>{{ service.short_description }}</p>
        <div class="card-footer">
            <span>${{ service.price }}</span>
            <a href="{% url 'catalogue:service_detail' service.slug %}">View details</a>
        </div>
    </div>
</article>
